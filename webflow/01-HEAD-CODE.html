<!-- ── Early Reveal Script (js-ready class + fade-in) ────── -->
<!-- Marks the <html> element as JS-capable immediately and
     triggers the .r → .on reveal animation as soon as the
     DOM is parsed. Content is visible by default via CSS, so
     if this script ever fails the page still shows instantly. -->
<script>
  document.documentElement.classList.add('js-ready');
  function _cogniFitReveal() {
    var els = document.querySelectorAll('.r');
    for (var i = 0; i < els.length; i++) els[i].classList.add('on');
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _cogniFitReveal);
  } else {
    _cogniFitReveal();
  }
  // Safety net: force visible after 1 s even if DOMContentLoaded is delayed
  setTimeout(_cogniFitReveal, 1000);
</script>
