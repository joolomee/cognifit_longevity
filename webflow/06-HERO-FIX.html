<!-- ════════════════════════════════════════════════════════
     HERO FIX — paste inside Webflow Page Settings
                → Custom code → Inside <head> tag
     AFTER your existing head <style> block. This forces
     the hero phones + logo to render like the Vercel site.
     ════════════════════════════════════════════════════════ -->
<style>
/* Nav logo — Webflow sometimes hides .logo-dark, force visible */
#nav .logo-dark{display:block !important;height:32px !important;width:auto !important;opacity:1 !important;visibility:visible !important}
#nav .nav-logo-link{display:inline-flex !important;align-items:center}

/* Hero grid — enforce 2 columns on desktop so phones get their column */
@media (min-width:981px){
  .hero-content{
    display:grid !important;
    grid-template-columns: 1fr 420px !important;
    gap: 48px !important;
    align-items: start !important;
    max-width: 1200px !important;
    margin: 0 auto !important;
    padding: 120px 40px 80px !important;
    position: relative !important;
    z-index: 2 !important;
  }
}

/* Hero phones container — MUST have height for absolute children */
.hero-phones{
  position: relative !important;
  height: 560px !important;
  min-height: 560px !important;
  width: 100% !important;
  display: block !important;
}

/* Phone cards — absolute positioning inside .hero-phones */
.hero-phones .phone{
  position: absolute !important;
  background: #101012 !important;
  border-radius: 36px !important;
  border: 1.5px solid rgba(255,255,255,.12) !important;
  box-shadow: 0 40px 100px rgba(0,0,0,.9), inset 0 0 0 1px rgba(255,255,255,.04) !important;
  overflow: hidden !important;
  display: block !important;
}
.hero-phones .phone-train{
  width: 220px !important;
  height: 440px !important;
  left: 0 !important;
  bottom: 0 !important;
  top: auto !important;
  right: auto !important;
  transform: rotate(-1deg);
  z-index: 2;
}
.hero-phones .phone-stats{
  width: 240px !important;
  height: 480px !important;
  right: 0 !important;
  top: 0 !important;
  left: auto !important;
  bottom: auto !important;
  transform: rotate(1deg);
  z-index: 3;
}

/* Phone body + content — restore dark card look */
.hero-phones .ph-body{padding:22px 18px !important}
.hero-phones .ph-title{font-size:15px !important;font-weight:800 !important;color:#fff !important;margin-bottom:14px !important}
.hero-phones .ph-skill{background:rgba(255,255,255,.07) !important;border-radius:10px !important;padding:12px 14px !important;margin-bottom:8px !important}
.hero-phones .ph-skill-name{font-size:11px !important;font-weight:600 !important;color:rgba(255,255,255,.7) !important;margin-bottom:8px !important}
.hero-phones .ph-skill-bar{height:5px !important;background:rgba(255,255,255,.1) !important;border-radius:3px !important;overflow:hidden !important;display:block !important}
.hero-phones .ph-skill-fill{height:100% !important;background:linear-gradient(90deg,#2db67a,#4add9f) !important;border-radius:3px !important;display:block !important}
.hero-phones .ph-next{background:rgba(255,255,255,.04) !important;border-radius:10px !important;padding:12px 14px !important;margin-top:8px !important}
.hero-phones .ph-next-label{font-size:10px !important;color:rgba(255,255,255,.72) !important;font-weight:600 !important;display:block !important}
.hero-phones .ph-next-val{font-size:10px !important;color:rgba(255,255,255,.65) !important;margin-top:3px !important;letter-spacing:.03em !important;display:block !important}

.hero-phones .ph-chart{background:linear-gradient(145deg,#1565c0,#0a3488) !important;border-radius:14px !important;padding:16px !important;margin-bottom:12px !important}
.hero-phones .ph-chart-label{font-size:9px !important;color:rgba(255,255,255,.75) !important;margin-bottom:10px !important;font-weight:600 !important;display:block !important}
.hero-phones .ph-bars{display:flex !important;align-items:flex-end !important;gap:5px !important;height:70px !important;margin-bottom:10px !important}
.hero-phones .ph-bar{flex:1 !important;border-radius:4px 4px 0 0 !important;background:rgba(255,255,255,.25) !important;display:block !important}
.hero-phones .ph-bar.peak{background:#2db67a !important}
.hero-phones .ph-goal-pill{display:inline-flex !important;background:rgba(255,255,255,.15) !important;border-radius:6px !important;padding:4px 10px !important;font-size:9px !important;font-weight:900 !important;color:#fff !important}

.hero-phones .ph-age-card{background:#fff !important;border-radius:14px !important;padding:14px !important}
.hero-phones .ph-age-lbl{font-size:10px !important;font-weight:800 !important;letter-spacing:.03em !important;color:#555 !important;margin-bottom:6px !important;display:block !important}
.hero-phones .ph-age-num{font-size:32px !important;font-weight:900 !important;color:#000 !important;line-height:1 !important;margin-bottom:4px !important;display:block !important}
.hero-phones .ph-age-ok{font-size:11px !important;color:#2db67a !important;font-weight:800 !important;margin-bottom:8px !important;display:block !important}
.hero-phones .ph-age-bar{height:5px !important;background:#ddd !important;border-radius:3px !important;overflow:hidden !important;margin-bottom:5px !important;display:block !important}
.hero-phones .ph-age-fill{height:100% !important;width:77% !important;background:#2db67a !important;border-radius:3px !important;display:block !important}
.hero-phones .ph-age-real{font-size:10px !important;color:#666 !important;font-weight:600 !important;display:block !important}

/* Mobile — hide phones, collapse grid */
@media (max-width:980px){
  .hero-content{grid-template-columns: 1fr !important}
  .hero-phones{display: none !important}
}
</style>
